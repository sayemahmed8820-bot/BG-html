<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS for beginners</title>
    <style>
        p {
            color: blue;
            font-size: 16px;}
            #subheading3{
                color: purple;
                font-size: 20px;
            }
       
    </style>
</head>
<body>
    <p class="simple">This is a simple paragraph.</p>
     <p style="color: red; font-size: 18px;">This is another paragraph.</p>
     <p style="color: green; font-size: 20px;">This is a third paragraph.</p>
     <p style="color: purple; font-size: 22px;">This is a fourth paragraph.</p>
     <a href="https://www.google.com">This is a link.</a>
     <a href="http://www.example.com">This is another link.</a>
     <h2>This is a heading.</h2>
     <h4>This is 2 subheading.</h4>
     <h4 id="subheading3">This is 3 subheading.</h4>
     <h4>This is 4 subheading.</h4>
     <h4>This is 5 subheading.</h4>
</body>
</html>
